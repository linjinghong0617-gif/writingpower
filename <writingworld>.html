<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WRITING WORLD</title>
    <style>
        /* ================= 核心风格定义：复古焦糖拿铁 ================= */
        :root {
            /* 暖咖基础色调 */
            --bg: #F5F1E7;              /* 奶泡白 (整体背景) */
            --sidebar-bg: #7b6196;      /* 浓缩咖啡深咖 (侧边栏) */
            --editor-bg: #FFFFFF;       /* 纯白 (编辑区背景) */
            --border-color: #E6DCD3;    /* 浅咖灰 (边框) */
            --text-main: #3E2F25;       /* 咖啡豆黑 (主要文字) */
            --text-muted: #8D7B6D;      /* 拿铁灰 (次要文字) */
            --input-bg: #FDFBF7;        /* 极浅奶油 (输入框背景) */

            /* 交互高亮色彩 */
            --primary: #9f7be3;         /* 焦糖色 (主色调) */
            --primary-light: #E8D5C4;   /* 浅焦糖 (主色浅调) */
            --secondary: #9FA8A3;       /* 鼠尾草绿 (Speaking模式/特殊高亮) */
            --accent: #E5A93C;          /* 蜂蜜金 (收藏星星) */
            --success: #6B8E7B;         /* 抹茶绿 (保存/完成) */
            --danger: #D27D67;          /* 枫叶红 (删除/警告) */
        }
        
        body { font-family: 'STHeitiSC-Light', 'STHeiti', 'PingFang SC', system-ui, serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        
        /* 滚动条美化 - 暖咖调 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f7eaf7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* 1. 侧边栏 - 深咖色 */
        #sidebar { width: 260px; background: var(--sidebar-bg); color: #F5F1E7; padding: 25px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 2; }
        .section-title { font-size: 11px; color: #e3daf5; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 12px; font-weight: 300; }
        #topic-list, #star-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        #star-list { max-height: 35%; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; }
        
        .list-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.04); font-size: 12px; transition: 0.3s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .list-item:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15); transform: translateX(3px); }
        .list-item b { color: var(--primary-light); font-weight: 500; }
        
        .star-item { border-left: 3px solid var(--accent); padding: 10px 12px; font-size: 12px; margin-bottom: 10px; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 0 6px 6px 0; transition: 0.2s; color: #E8D5C4; }
        .star-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .star-item b { color: var(--accent); }

        /* 2. 中间：模版库管理 */
        #editor { width: 400px; background: var(--editor-bg); border-right: 1px solid var(--border-color); padding: 25px 30px; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        
        .tpl-tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-wrapper { position: relative; display: flex; align-items: center; }
        
        /* 标签按钮 - 焦糖拿铁色调 */
        .tab-btn { padding: 9px 35px 9px 18px; border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; font-size: 12px; background: var(--input-bg); transition: all 0.3s; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }
        .tab-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(196, 139, 93, 0.4); }
        
        .tab-close { position: absolute; right: 12px; font-size: 16px; color: rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s; opacity: 0; }
        .tab-wrapper:hover .tab-close { opacity: 1; }
        .tab-close:hover { color: var(--danger) !important; transform: scale(1.2); }
        .tab-btn.active + .tab-close { color: rgba(255,255,255,0.7); }

        .tab-add-btn { padding: 9px 18px; border-radius: 20px; border: 1px dashed var(--primary); cursor: pointer; font-size: 12px; background: #fff; color: var(--primary); font-weight: bold; transition: 0.2s; }
        .tab-add-btn:hover { background: var(--primary); color: white; border-style: solid; }

        /* 输入框区域 */
        .input-grid { display: grid; gap: 14px; margin-top: 20px; padding-bottom: 25px; }
        .input-row { display: flex; align-items: center; background: var(--input-bg); padding: 11px 15px; border-radius: 8px; border: 1px solid #eee; transition: 0.2s; }
        .input-row:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(196, 139, 93, 0.15); background: #fff; }
        .input-row label { width: 140px; font-size: 12px; color: var(--text-muted); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; border-right: 1px solid #eee; padding-right: 5px; }
        .input-row input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; color: var(--text-main); font-family: inherit; }
        
        /* 收藏星星 */
        .star-icon { cursor: pointer; color: #D5C8B9; font-size: 16px; transition: 0.2s; margin-left: 5px; }
        .star-icon:hover { color: var(--accent); transform: scale(1.2); }

        /* 3. 右侧预览区 */
        #preview { flex: 1; padding: 50px; overflow-y: auto; background: var(--bg); position: relative; }
        
        #article-view { font-size: 18px; line-height: 2.8; text-align: justify; margin-bottom: 50px; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); color: var(--text-main); border: 1px solid rgba(0,0,0,0.02); }
        
        /* 槽位 */
        .slot { display: inline-flex; min-width: 110px; height: 34px; border-bottom: 2px dashed #D5C8B9; margin: 0 8px; vertical-align: middle; position: relative; justify-content: center; align-items: center; background: #FAF7F2; border-radius: 4px 4px 0 0; transition: 0.2s; }
        .slot::before { content: attr(data-hint); position: absolute; font-size: 11px; color: #BDB0A5; bottom: -26px; white-space: nowrap; font-weight: 500; letter-spacing: 0.5px; }
        .slot.filled { border: none; background: transparent; }
        
        #word-pool { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 35px; border: 2px dashed var(--border-color); border-radius: 15px; min-height: 130px; background: rgba(255,255,255,0.6); }
        
        /* 词块 - 焦糖色 */
        .chip { background: white; border: 2px solid var(--primary); padding: 9px 20px; border-radius: 12px; cursor: grab; font-size: 15px; font-weight: 500; color: var(--primary); box-shadow: 0 5px 15px rgba(196, 139, 93, 0.15); transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); user-select: none; }
        .chip:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px rgba(196, 139, 93, 0.25); background: var(--input-bg); }
        .chip.placed { background: var(--success); border-color: var(--success); color: white; cursor: default; box-shadow: none; transform: none; }

        /* 按钮 */
        .action-btn { width: 100%; padding: 16px; margin-top: 15px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; background: var(--text-main); color: #fff; transition: 0.3s; box-shadow: 0 5px 15px rgba(62, 47, 37, 0.2); letter-spacing: 1px; }
        .action-btn:hover { background: #2A1F18; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(62, 47, 37, 0.3); }

        /* ================= 弹窗系统 - 修复了悬浮！ ================= */
        .modal-overlay { 
            position: fixed; /* 必须加 fixed 才能全屏悬浮 */
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(46, 35, 27, 0.6); 
            backdrop-filter: blur(5px);
            z-index: 9999; /* 确保在所有元素之上 */
            display: none; /* 默认隐藏 */
            justify-content: center;
            align-items: center;
        }
        
        .tpl-modal { width: 600px; border-radius: 15px; box-shadow: 0 25px 60px rgba(0,0,0,0.25); border: 1px solid rgba(0,0,0,0.05); overflow: hidden; background: #fff; }
        
        /* 弹窗头部 */
        .modal-header { background: #FDFBF7; border-top: 5px solid var(--primary); padding: 22px 30px; display: flex; justify-content: space-between; align-items: center;}
        .modal-header h3 { margin: 0; font-size: 17px; color: var(--primary); letter-spacing: 0.5px; }
        
        .modal-body { padding: 30px; background: #fff; max-height: 60vh; overflow-y: auto;}
        .modal-body label { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; display: block; font-weight: bold;}
        
        #edit-tpl-content { width: 100%; height: 180px; border: 1px solid #eee; background: var(--input-bg); border-radius: 8px; padding: 10px; box-sizing: border-box; resize: vertical; outline: none;}
        #edit-tpl-content:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(196, 139, 93, 0.15); }
        #edit-tpl-name { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 8px; outline: none; box-sizing: border-box; }
        #edit-tpl-name:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(196, 139, 93, 0.15); }

        /* 提示词编辑区 */
        #dynamic-hint-inputs { background: var(--input-bg); padding: 20px; border-radius: 10px; border: 1px dashed var(--border-color); display: grid; gap: 10px;}
        .hint-edit-row { display: flex; align-items: center; gap: 10px;}
        .hint-edit-row span { color: var(--success); font-weight: bold; width: 40px;}
        .hint-val-input { flex: 1; padding: 8px; border: 1px solid #eee; border-radius: 6px; outline: none; }
        .hint-val-input:focus { border-color: var(--success) !important; box-shadow: 0 0 0 3px rgba(107, 142, 123, 0.2) !important; }
        
        .modal-footer { padding: 20px 30px; background: #FDFBF7; display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #eee;}
        
        .btn-save { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(107, 142, 123, 0.3); transition: 0.2s;}
        .btn-save:hover { background: #567363; box-shadow: 0 6px 15px rgba(107, 142, 123, 0.4); }
        
        .btn-cancel { background: #E6DCD3; color: var(--text-main); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-cancel:hover { background: #D5C8B9; }
    </style>
</head>
<body class="writing-mode">

    <div id="sidebar">
        <div class="section-title">🕒 我的练习记录</div>
        <div id="topic-list"></div>
        <button onclick="saveCurrentTopic()" style="width:100%; padding:12px; background:var(--success); border:none; color:white; border-radius:8px; cursor:pointer; margin-top:15px; font-weight:bold; transition:0.3s; box-shadow: 0 4px 10px rgba(107, 142, 123, 0.3);">💾 保存当前练习</button>
        <div class="section-title" style="margin-top:30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">⭐ 语料收藏夹</div>
        <div id="star-list"></div>
    </div>

    <div id="editor">
        <div class="section-title" style="margin-top: 0;">📚 模版库管理</div>
        <div class="tpl-tabs" id="tpl-tabs-container"></div>
        
        <input type="text" id="cur-topic-name" placeholder="输入本次练习名称 (例: 科技利弊分析)..." style="width:100%; padding:14px; border:1px solid #eee; border-radius:10px; margin-bottom:10px; box-sizing:border-box; font-size:14px; outline:none; transition:0.3s; background: var(--input-bg); font-family: inherit;">
        
        <div id="input-container" class="input-grid"></div>
        <button class="action-btn" onclick="buildGame()">🔄 生成拼图练习</button>
    </div>

    <div id="preview">
        <div id="article-view"></div>
        <div id="word-pool"></div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeTplEditor(event)">
        <div class="tpl-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>✨ 新增 / 编辑模版</h3>
                <span style="cursor:pointer; font-size:24px; color:#BDB0A5; transition: 0.2s;" onclick="closeTplEditor(event)" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='#BDB0A5'">×</span>
            </div>
            <div class="modal-body">
                <div style="margin-bottom:25px;">
                    <label>模版名称</label>
                    <input type="text" id="edit-tpl-name" placeholder="例如: 图表小作文模版 / 原因分析类模版">
                </div>
                
                <div style="margin-bottom:25px;">
                    <label style="color:var(--danger);">1. 模版正文逻辑 (使用 [1], [2] 标注需要填空的位置)</label>
                    <textarea id="edit-tpl-content" oninput="syncHintsEditor()" placeholder="在此粘贴你的模版内容..."></textarea>
                </div>

                <div>
                    <label style="color:var(--success);">2. 自定义提示词 (根据上方正文的序号自动生成)</label>
                    <div id="dynamic-hint-inputs">
                        <span style="color:var(--text-muted); font-size:12px; grid-column: span 2; text-align: center; font-style: italic; padding: 10px 0;">请先在上方输入包含 [序号] 的正文，输入框会在此自动出现。</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeTplEditor(event)">取消</button>
                <button class="btn-save" onclick="confirmAddNewTemplate()">✅ 保存为新模版</button>
            </div>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'ielts_tpl_v13_coffee'; 

    let templates = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        {
            name: "经典写作(16点)",
            content: "[1] has influenced [2]. While some see [1] as positive, others concern [14]. [3] offers balance. <br><br> Advantage of [1] is [4], leading to [5]. [6] proves this. Although [7], scrutiny suggests [8]. <br><br> Yet [9] leads to [10]. [11] is an example. Given [12], we conclude [13]. <br><br> In summary, although [14], merits of [1] outweigh drawbacks. [15] results in [16].",
            hints: {1:"主题词A", 2:"领域词", 3:"核心立场", 4:"正面作用", 5:"连锁反应", 6:"证据引用", 7:"反面论据", 8:"逻辑反驳", 9:"风险隐患", 10:"负面后果", 11:"负面案例", 12:"结论依据", 13:"最终结论词", 14:"反对派忧虑", 15:"专家建议", 16:"未来图景"}
        }
    ];

    let currentTplIdx = 0;
    let storage = JSON.parse(localStorage.getItem('ielts_data_v13_coffee') || '[]');
    let stars = JSON.parse(localStorage.getItem('ielts_stars_v13_coffee') || '[]');
    let dragged = null;

    window.onload = () => { renderTplTabs(); renderInputs(); renderStars(); renderSidebar(); buildGame(); };

    function renderTplTabs() {
        const container = document.getElementById('tpl-tabs-container');
        container.innerHTML = '';
        
        templates.forEach((tpl, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'tab-wrapper';
            wrapper.innerHTML = `
                <button class="tab-btn ${currentTplIdx === i ? 'active' : ''}" onclick="switchTpl(${i})">${tpl.name}</button>
                <span class="tab-close" onclick="deleteTpl(event, ${i})" title="删除模版">✖</span>
            `;
            container.appendChild(wrapper);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'tab-add-btn';
        addBtn.innerHTML = '➕ 新增模版';
        addBtn.onclick = openTplEditor;
        container.appendChild(addBtn);
    }

    function switchTpl(idx) {
        currentTplIdx = idx;
        renderTplTabs(); renderInputs(); buildGame();
    }

    function deleteTpl(e, idx) {
        e.stopPropagation(); 
        if (templates.length <= 1) return alert("至少需保留一个模版。");
        if (confirm(`确定要删除模版 "${templates[idx].name}" 吗？此操作不可逆。`)) {
            templates.splice(idx, 1);
            if (currentTplIdx >= templates.length) currentTplIdx = templates.length - 1;
            saveTplsToLocal();
            renderTplTabs(); renderInputs(); buildGame();
        }
    }

    function openTplEditor() {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('edit-tpl-name').value = '';
        document.getElementById('edit-tpl-content').value = '';
        document.getElementById('dynamic-hint-inputs').innerHTML = '<span style="color:var(--text-muted); font-size:12px; grid-column: span 2; text-align: center; font-style: italic; padding: 10px 0;">请先在上方输入包含 [序号] 的正文，输入框会在此自动出现。</span>';
    }

    function closeTplEditor(e) {
        if(e) e.preventDefault();
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function syncHintsEditor() {
        const content = document.getElementById('edit-tpl-content').value;
        const hintContainer = document.getElementById('dynamic-hint-inputs');
        const matches = content.match(/\[(\d+)\]/g) || [];
        const uniqueIds = [...new Set(matches.map(m => parseInt(m.match(/\d+/)[0])))].sort((a,b)=>a-b);
        
        const currentInputs = {};
        document.querySelectorAll('.hint-val-input').forEach(inp => currentInputs[inp.dataset.id] = inp.value);

        hintContainer.innerHTML = '';
        if(uniqueIds.length === 0) {
            hintContainer.innerHTML = '<span style="color:var(--text-muted); font-size:12px; grid-column: span 2; text-align: center; font-style: italic; padding: 10px 0;">未检测到序号。请输入如 [1], [2] 的标记。</span>';
            return;
        }

        uniqueIds.forEach(id => {
            const val = currentInputs[id] || "";
            hintContainer.innerHTML += `
                <div class="hint-edit-row">
                    <span>[${id}]</span>
                    <input type="text" class="hint-val-input" data-id="${id}" value="${val}" placeholder="第 ${id} 处的提示词...">
                </div>`;
        });
    }

    function confirmAddNewTemplate() {
        const name = document.getElementById('edit-tpl-name').value.trim() || "未命名模版";
        const content = document.getElementById('edit-tpl-content').value.replace(/\n/g, '<br>');
        
        if(!content.includes('[')) {
            alert("请在模版正文中加入 [1]、[2] 这样的填空序号！");
            return;
        }

        const newHints = {};
        document.querySelectorAll('.hint-val-input').forEach(inp => {
            newHints[inp.dataset.id] = inp.value || `词条${inp.dataset.id}`;
        });
        
        templates.push({ name, content, hints: newHints });
        currentTplIdx = templates.length - 1; 
        
        saveTplsToLocal();
        renderTplTabs(); renderInputs(); closeTplEditor();
        buildGame();
    }

    function saveTplsToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(templates)); }

    function renderInputs() {
        const container = document.getElementById('input-container');
        container.innerHTML = '';
        const tpl = templates[currentTplIdx];
        if(!tpl) return;
        const matches = tpl.content.match(/\[(\d+)\]/g) || [];
        const uniqueIds = [...new Set(matches.map(m => parseInt(m.match(/\d+/)[0])))].sort((a,b)=>a-b);

        uniqueIds.forEach((id) => {
            const hintText = tpl.hints[id] || `词条 ${id}`;
            container.innerHTML += `
                <div class="input-row">
                    <label title="${hintText}">#${id} ${hintText}</label>
                    <input type="text" class="eng-in" data-id="${id}" placeholder="输入内容...">
                    <span class="star-icon" onclick="addStar(${id})" title="收藏此语料">★</span>
                </div>`;
        });
    }

    function buildGame() {
        const tpl = templates[currentTplIdx];
        if(!tpl) return;
        const inputs = document.querySelectorAll('.eng-in');
        const wordMap = {}; 
        inputs.forEach(input => { if(input.value.trim()) wordMap[input.dataset.id] = input.value.trim(); });

        let html = tpl.content.replace(/\[(\d+)\]/g, (m, id) => {
            return `<span class="slot" data-logic-id="${id}" data-hint="${tpl.hints[id] || '编号'+id}"></span>`;
        });
        document.getElementById('article-view').innerHTML = html;

        const pool = document.getElementById('word-pool');
        pool.innerHTML = '';
        const allMatches = tpl.content.match(/\[(\d+)\]/g) || [];
        const chips = [];
        allMatches.forEach(m => {
            const id = m.match(/\d+/)[0];
            if(wordMap[id]) chips.push({ id, text: wordMap[id] });
        });

        chips.sort(() => Math.random() - 0.5).forEach(obj => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.textContent = obj.text;
            chip.draggable = true;
            chip.dataset.logicId = obj.id;
            
            chip.ondragstart = (e) => { 
                dragged = chip; 
                setTimeout(() => chip.style.opacity = '0.4', 0);
            };
            chip.ondragend = () => chip.style.opacity = '1';
            pool.appendChild(chip);
        });

        document.querySelectorAll('.slot').forEach(slot => {
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = () => {
                if(dragged && dragged.dataset.logicId === slot.dataset.logicId) {
                    slot.appendChild(dragged);
                    slot.classList.add('filled');
                    dragged.classList.add('placed');
                    dragged.draggable = false;
                    dragged = null;
                }
            };
        });
    }

    function saveCurrentTopic() {
        const name = document.getElementById('cur-topic-name').value || '未命名练习';
        const words = {};
        document.querySelectorAll('.eng-in').forEach(i => words[i.dataset.id] = i.value);
        storage.push({ name, tplIdx: currentTplIdx, words });
        localStorage.setItem('ielts_data_v13_coffee', JSON.stringify(storage));
        renderSidebar();
    }

    function renderSidebar() {
        const list = document.getElementById('topic-list');
        list.innerHTML = '';
        storage.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<b>${templates[item.tplIdx]?.name || '模版已删'}</b>: ${item.name}`;
            div.onclick = () => {
                if(!templates[item.tplIdx]) { alert("该模版已被删除，无法加载数据"); return; }
                currentTplIdx = item.tplIdx;
                renderTplTabs(); renderInputs();
                const inputs = document.querySelectorAll('.eng-in');
                inputs.forEach(inp => { if(item.words[inp.dataset.id]) inp.value = item.words[inp.dataset.id]; });
                document.getElementById('cur-topic-name').value = item.name;
                buildGame();
            };
            list.appendChild(div);
        });
    }

    function addStar(id) {
        const input = document.querySelector(`.eng-in[data-id="${id}"]`);
        if(!input || !input.value.trim()) return;
        stars.push({ hint: templates[currentTplIdx].hints[id] || `词条${id}`, text: input.value.trim() });
        localStorage.setItem('ielts_stars_v13_coffee', JSON.stringify(stars));
        renderStars();
    }

    function renderStars() {
        const list = document.getElementById('star-list');
        list.innerHTML = '';
        stars.forEach(s => {
            const div = document.createElement('div');
            div.className = 'star-item';
            div.innerHTML = `<b>${s.hint}:</b> ${s.text}`;
            div.onclick = () => {
                const tpl = templates[currentTplIdx];
                for(let id in tpl.hints) {
                    if(tpl.hints[id] === s.hint) {
                        const target = document.querySelector(`.eng-in[data-id="${id}"]`);
                        if(target) {
                            target.value = s.text;
                            target.style.background = "#FDFBF7";
                            setTimeout(()=> target.style.background = "var(--input-bg)", 500);
                        }
                    }
                }
            };
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
